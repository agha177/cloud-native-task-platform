apiVersion: apps/v1
kind: Deployment

metadata:
  name: api
  namespace: task-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
      - name: api
        image: task-api:v1
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5000

        env:
        - name: MONGO_HOST
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: MONGO_HOST

        - name: MONGO_USER
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-root-username

        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-root-password
